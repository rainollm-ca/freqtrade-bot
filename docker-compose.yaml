---
services:
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    restart: unless-stopped
    container_name: freqtrade
    volumes:
      - "./user_data:/freqtrade/user_data"
    expose:
      - "8080"
    environment:
      - SERVICE_FQDN_FREQTRADE_8080=https://freqtrade.rainomotion.com
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.freqtrade.rule=Host(`freqtrade.rainomotion.com`)"
      - "traefik.http.routers.freqtrade.entrypoints=https"
      - "traefik.http.routers.freqtrade.tls=true"
      - "traefik.http.routers.freqtrade.tls.certresolver=letsencrypt"
      - "traefik.http.services.freqtrade.loadbalancer.server.port=8080"
      - "traefik.http.routers.freqtrade-http.rule=Host(`freqtrade.rainomotion.com`)"
      - "traefik.http.routers.freqtrade-http.entrypoints=http"
      - "traefik.http.routers.freqtrade-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --db-url sqlite:////freqtrade/user_data/tradesv3.sqlite
      --config /freqtrade/user_data/config.json
      --strategy SampleStrategy
